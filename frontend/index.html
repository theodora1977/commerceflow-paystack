<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CommerceFlow Store</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="#" class="nav-link active" data-filter="all">All</a>
            <a href="#" class="nav-link" data-filter="electronics">Electronics</a>
        </nav>
        <button id="cartTrigger">Cart (<span id="cartBadge">0</span>)</button>
    </header>

    <main>
        <section class="hero">
            <h1 id="sectionTitle">All Products</h1>
            <p id="productCount">0 items</p>
        </section>

        <div id="productsGrid"></div>
        <div id="emptyState" style="display: none;">No products found.</div>
    </main>

    <!-- Cart Drawer -->
    <div id="overlay"></div>
    <div id="cartDrawer" class="drawer">
        <div class="drawer-header">
            <h2>Your Cart</h2>
            <button id="cartClose">&times;</button>
        </div>
        <div id="cartBody">
            <div id="cartEmpty">Your cart is empty</div>
            <div id="cartItems"></div>
        </div>
        <div id="cartFooter" style="display: none;">
            <div class="total-row">
                <span>Total:</span>
                <span id="cartTotal">₦0</span>
            </div>
            <input type="email" id="emailInput" placeholder="Enter your email" required>
            <button id="checkoutBtn" class="btn-pay">
                <span class="btn-text">Checkout with Paystack</span>
                <span class="btn-spinner" style="display: none;">...</span>
            </button>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="/static/app.js"></script>
</body>
</html>
